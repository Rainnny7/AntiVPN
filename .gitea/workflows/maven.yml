name: Java CI
on: [ push ]
jobs:
  build:
    runs-on: ubuntu-latest
    container: git.rainnny.club/rainnny/gitea-runner:java-17
    steps:
      - name: Checkout
        uses: https://gitea.com/actions/checkout@v3

      - name: Maven Build
        run: mvn clean package --batch-mode --update-snapshots -Dmaven.test.skip=true